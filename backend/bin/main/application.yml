server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/airdrophunter}
    username: ${SPRING_DATASOURCE_USERNAME:airdrop_user}
    password: ${SPRING_DATASOURCE_PASSWORD:airdrop_secret_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration



management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.airdrophunter: DEBUG
    org.springframework.web: INFO

wallet:
  apis:
    etherscan-url: ${ETHERSCAN_API_URL:https://api.etherscan.io/api}
    etherscan-api-key: ${ETHERSCAN_API_KEY:}
    alchemy-url: ${ALCHEMY_API_URL:https://eth-mainnet.g.alchemy.com/v2}
    alchemy-api-key: ${ALCHEMY_API_KEY:}
    zksync-url: ${ZKSYNC_API_URL:https://mainnet.era.zksync.io}

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-at-least-64-characters-long-secret-key-here}
  expiration-ms: ${JWT_EXPIRATION_MS:2592000000}  # 30 days

gumroad:
  webhook-secret: ${GUMROAD_WEBHOOK_SECRET:}

telegram:
  bot:
    username: ${TELEGRAM_BOT_USERNAME:AirdropHunterBot}
    token: ${TELEGRAM_BOT_TOKEN:}

